name: Build .exe

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  app:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cx_Freeze

      - run: |
          python build.py build

      - uses: actions/upload-artifact@v4
        with:
          name: app_debug
          path: dist/app_debug/**

  updater:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cx_Freeze

      - run: |
          python buildu.py build

      - uses: actions/upload-artifact@v4
        with:
          name: updater_app_debug
          path: dist/updater_app_debug/**
          
